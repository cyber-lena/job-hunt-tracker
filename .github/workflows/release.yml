name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

# ══════════════════════════════════════════════════════════════════════════════
#  LINUX
# ══════════════════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install WebKitGTK (webview runtime)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc pkg-config libwebkit2gtk-4.1-dev
          sudo ln -sf \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Build Linux binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          go mod tidy
          mkdir -p dist
          go build -tags webkit2gtk_4_1 \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/job-hunt-tracker-linux-amd64 .

      - name: Build .deb package
        run: bash build/linux/build-deb.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/job-hunt-tracker-linux-amd64
            dist/*.deb

# ══════════════════════════════════════════════════════════════════════════════
#  WINDOWS
# ══════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build Windows binary
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
        run: |
          go mod tidy
          go install github.com/tc-hib/go-winres@latest
          go-winres make --in winres/winres.json
          if (Test-Path "winres/*.syso") {
            Move-Item "winres/*.syso" "." -Force
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }} -H=windowsgui" `
            -o dist\job-hunt-tracker-windows-amd64.exe .
          Copy-Item "winres/icon.ico" dist

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          & "C:\Program Files (x86)\NSIS\makensis.exe" build/windows/installer.nsi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/job-hunt-tracker-windows-amd64.exe
            dist/JobHuntTracker-Setup.exe

# ══════════════════════════════════════════════════════════════════════════════
#  MACOS — universal binary + signed .app + .pkg installer + .dmg
# ══════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build macOS arm64 binary (Apple Silicon)
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          go mod tidy
          mkdir -p dist
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/job-hunt-tracker-darwin-arm64 .

      - name: Build macOS amd64 binary (Intel)
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: amd64
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/job-hunt-tracker-darwin-amd64 .

      - name: Create universal binary (arm64 + amd64)
        run: |
          lipo -create -output dist/job-hunt-tracker-darwin-universal \
            dist/job-hunt-tracker-darwin-arm64 \
            dist/job-hunt-tracker-darwin-amd64
          cp dist/job-hunt-tracker-darwin-universal dist/job-hunt-tracker-darwin-arm64

      #  build the .app bundle and .dmg via your existing script ──────
      - name: Build .app bundle and .dmg
        run: bash build/macos/build-dmg.sh

      # ensure the main executable bit is set inside the bundle ──────
      # (the Go binary should already be +x, but this is an explicit guarantee
      #  — macOS Gatekeeper will reject a bundle whose binary isn't executable)
      - name: Fix executable permissions in .app
        run: |
          APP_PATH="dist/JobHuntTracker.app"  
          BINARY_NAME="job-hunt-tracker"          # must match CFBundleExecutable in Info.plist
          chmod +x "${APP_PATH}/Contents/MacOS/${BINARY_NAME}"
      # Also harden any helper executables or bundled frameworks
      #   find "${APP_PATH}/Contents" -type f -perm /0111 -exec chmod +x {} \;

      #  ad-hoc code-sign the entire .app bundle ──────────────────────
      # --deep:  signs all nested frameworks/helpers in one pass
      # --force: re-signs if any prior signature exists
      # -s -:    ad-hoc identity (no Developer ID required)
      # --options runtime: enables Hardened Runtime flag — required for
      #   Gatekeeper to accept an ad-hoc-signed app on macOS 13+
      - name: Ad-hoc sign .app bundle
        run: |
          APP_PATH="dist/JobHuntTracker.app"
          codesign --deep --force --options runtime \
            --sign - \
            "${APP_PATH}"
          # Verify the signature looks correct before packaging
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
          spctl --assess --type exec --verbose "${APP_PATH}" || true
          # Note: spctl may still show "rejected" for ad-hoc signatures when
          # Gatekeeper's online notarization check runs. Users can bypass this
          # with: sudo xattr -rd com.apple.quarantine /Applications/JobHuntTracker.app
          # OR: right-click → Open on first launch.

      # build a .pkg installer with pkgbuild ─────────────────────────
      # pkgbuild installs the .app into /Applications and respects the signed
      # bundle as-is. The component-plist lets us declare that this package
      # is an application and should relocate to /Applications.
      - name: Build .pkg installer
        run: |
          APP_PATH="dist/JobHuntTracker.app"
          PKG_PATH="dist/JobHuntTracker-${{ github.ref_name }}.pkg"

          # Generate a component plist so pkgbuild knows this is an .app
          pkgbuild --analyze --root dist/ build/macos/component.plist || true

          # Patch the plist to set BundleIsRelocatable=false so the installer
          # always targets /Applications (optional but recommended)
          /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" \
            build/macos/component.plist 2>/dev/null || true

          # Build the component package
          pkgbuild \
            --root dist/ \
            --component-plist build/macos/component.plist \
            --install-location /Applications \
            --identifier "com.yourname.job-hunt-tracker" \
            --version "${{ github.ref_name }}" \
            "${PKG_PATH}"

          # Ad-hoc sign the .pkg itself (same -s - identity)
          productsign --sign - "${PKG_PATH}" "dist/JobHuntTracker.pkg" \
            || cp "${PKG_PATH}" "dist/JobHuntTracker.pkg"
          # productsign may not accept ad-hoc on all macOS versions; the fallback
          # cp ensures the artifact always exists.

      # ── NEW: upload all macOS artifacts including the .pkg ────────────────
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/job-hunt-tracker-darwin-universal
            dist/JobHuntTracker.dmg
            dist/JobHuntTracker.pkg

# ══════════════════════════════════════════════════════════════════════════════
#  RELEASE
# ══════════════════════════════════════════════════════════════════════════════
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directories
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" release/
          done
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Job Hunt Tracker ${{ github.ref_name }}"
          body: |
            ## Job Hunt Tracker ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | **Windows** | `JobHuntTracker-Setup.exe` | Installer wizard — recommended |
            | **Windows** | `job-hunt-tracker-windows-amd64.exe` | Standalone binary |
            | **macOS** | `JobHuntTracker.pkg` | Installer — recommended |
            | **macOS** | `JobHuntTracker.dmg` | Drag to Applications |
            | **macOS** | `job-hunt-tracker-darwin-universal` | Universal binary (Intel + Apple Silicon) |
            | **Linux** | `job-hunt-tracker_*_amd64.deb` | `sudo dpkg -i` |
            | **Linux** | `job-hunt-tracker-linux-amd64` | Standalone binary |

            ### macOS Gatekeeper note
            This build uses **ad-hoc signing** (no Apple Developer ID). On first launch you may see a Gatekeeper warning. To clear it after installing:

             sudo xattr -rd com.apple.quarantine /Applications/JobHuntTracker.app
            Or right-click the app → **Open** to approve it once manually.

            ### Linux runtime dependency
            sudo apt install libwebkit2gtk-4.1-0
          draft: false
          prerelease: false
          files: release/*
